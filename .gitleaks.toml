# Gitleaks configuration
# https://github.com/gitleaks/gitleaks#configuration

title = "gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Known false positives"
paths = [
  # Vendored Helm charts. Treat like node_modules; READMEs ship example keys.
  '''k8s/.*/charts/.*''',
]

# Allowlisted commits. Each one needs a one-line reason.
commits = [
  # Local-stack exploration doc with throwaway compose creds. File later removed.
  "43e162d901d753024eb52073558fc7e19d146d2b",
]
