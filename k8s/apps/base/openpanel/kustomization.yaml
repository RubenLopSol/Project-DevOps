# Base for the OpenPanel app stack: API (Rollout), Dashboard, Worker,
# Postgres, ClickHouse, Redis, Ingress, NetworkPolicies. Environment-specific
# tuning is applied via overlays/{staging,prod}.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openpanel

resources:
  # Config
  - configmap.yaml
  # API (Argo Rollouts canary)
  - api-rollout.yaml
  - api-service.yaml
  - api-canary-service.yaml
  # Dashboard
  - start-deployment.yaml
  - start-service.yaml
  # DB migrations (runs as ArgoCD PreSync hook before every deploy)
  - migrate-job.yaml
  # Worker
  - worker-deployment.yaml
  # PostgreSQL
  - postgres-statefulset.yaml
  - postgres-service.yaml
  # ClickHouse
  - clickhouse-configmap.yaml
  - clickhouse-statefulset.yaml
  - clickhouse-service.yaml
  # Redis
  - redis-statefulset.yaml
  - redis-service.yaml
  # Networking
  - ingress.yaml
  - network-policies.yaml
  # TLS — cert-manager reconciles this Certificate into openpanel-tls Secret
  - certificate.yaml
  # Observability — ServiceMonitors picked up by Prometheus Operator
  - servicemonitors.yaml
  # Grafana dashboards — sidecar picks up ConfigMaps labelled grafana_dashboard=1
  - grafana-dashboards-configmap.yaml

# Auto-build dashboard ConfigMaps from raw JSON files in dashboards/.
# Keeps the JSON files as source of truth (importable into any Grafana) while
# the kube-prometheus-stack sidecar still loads them automatically — the
# `grafana_dashboard: "1"` label is what it matches on; the `grafana_folder`
# annotation sets the Grafana folder name.
configMapGenerator:
  - name: grafana-dashboard-cluster-overview
    files:
      - dashboards/cluster-overview.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "Cluster"
  - name: grafana-dashboard-openpanel-app
    files:
      - dashboards/openpanel-app.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "OpenPanel"

labels:
  - pairs:
      project: openpanel
    includeSelectors: false
