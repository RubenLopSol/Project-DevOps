# OpenPanel — sync wave 4.
# Comes up after observability (Loki, Promtail, Tempo are wave 3) so the
# moment the first pod starts emitting logs and metrics, something is
# already there to scrape and tail it. Avoids a blind spot on cold start.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openpanel
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openpanel
  source:
    repoURL: https://github.com/RubenLopSol/Project-DevOps.git
    targetRevision: release/main-c871e04
    # Set by overlays/*/argocd/patches/app-env.yaml — never hardcoded here
    path: PLACEHOLDER
  destination:
    server: https://kubernetes.default.svc
    namespace: openpanel
  # volumeClaimTemplates is immutable on a StatefulSet, so once a cluster is
  # running we can't patch storageClassName. Fresh clusters get the right
  # value (local-path) from the staging overlay; older clusters keep whatever
  # they were created with, and ArgoCD rightly refuses to fight that.
  # TODO: drop this ignoreDifferences once staging gets rebuilt — on a clean
  # cluster the field already matches and this entry becomes a no-op.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
      # On a fresh cluster ArgoCD reconciles every Application in parallel,
      # so this app's dry-run can fire *before* kube-prometheus-stack has
      # finished installing the ServiceMonitor / PodMonitor CRDs. Without
      # this flag the dry-run errors with "no matches for kind ServiceMonitor",
      # the retry budget runs out, and openpanel sits OutOfSync until
      # someone hits sync by hand.
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
