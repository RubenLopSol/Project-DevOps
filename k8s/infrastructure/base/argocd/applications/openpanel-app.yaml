# OpenPanel — sync wave 4.
# Comes up after observability (Loki, Promtail, Tempo are wave 3) so the
# moment the first pod starts emitting logs and metrics, something is
# already there to scrape and tail it. Avoids a blind spot on cold start.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openpanel
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openpanel
  source:
    repoURL: https://github.com/RubenLopSol/Project-DevOps.git
    targetRevision: release/main-5faadfb
    # Set by overlays/*/argocd/patches/app-env.yaml 
    path: PLACEHOLDER
  destination:
    server: https://kubernetes.default.svc
    namespace: openpanel
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
      # On a fresh cluster ArgoCD reconciles every Application in parallel,
      # so this app's dry-run can fire *before* kube-prometheus-stack has
      # finished installing the ServiceMonitor / PodMonitor CRDs. Without
      # this flag the dry-run errors with "no matches for kind ServiceMonitor",
      # the retry budget runs out, and openpanel sits OutOfSync until
      # someone hits sync by hand.
      - SkipDryRunOnMissingResource=true
    retry:
      # On a fresh cluster the upstream CRDs (Rollout from argo-rollouts,
      # ServiceMonitor from kube-prometheus-stack) can take several minutes
      # to install — the kube-prometheus-stack admission Job alone has a
      # known watcher race that delays its hook completion by 1-2 minutes.
      # 5 retries with this backoff gives ~5 min, which isn't enough; 10
      # gives ~14 min total absorption window before openpanel gives up.
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
