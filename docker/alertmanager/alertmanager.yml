global:
  resolve_timeout: 1m

route:
  receiver: 'webhook-sink'        # default — mechanical verification path
  group_by: ['alertname', 'job']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 5m
  routes:
    # Fan out to Slack as well. continue:true keeps the default (webhook-sink)
    # path firing so you can verify in Loki even when Slack isn't configured.
    - receiver: 'slack'
      continue: true

receivers:
  - name: 'webhook-sink'
    webhook_configs:
      - url: 'http://webhook-sink:8080/'
        send_resolved: true

  # Slack is the human-facing local receiver. The __SLACK_WEBHOOK_URL__
  # placeholder is rewritten at container startup by the alertmanager
  # entrypoint (see docker-compose.yml), reading SLACK_WEBHOOK_URL from .env.
  # If unset, it falls back to a no-op local URL so Alertmanager still starts.
  - name: 'slack'
    slack_configs:
      - api_url: '__SLACK_WEBHOOK_URL__'
        channel: '#alerts-thesis'
        send_resolved: true
        title: '{{ .Status | toUpper }} · {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts -}}
          *Severity:* `{{ .Labels.severity }}`
          *Job:* `{{ .Labels.job }}`
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: ['alertname', 'job']
