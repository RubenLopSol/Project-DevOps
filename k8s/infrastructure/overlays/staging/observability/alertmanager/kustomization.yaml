# =============================================================================
# Alertmanager — STAGING overlay
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: alertmanager
    repo: https://prometheus-community.github.io/helm-charts
    version: "1.13.0"
    releaseName: alertmanager
    namespace: observability
    includeCRDs: false
    valuesFile: ../../../../base/observability/alertmanager/values.yaml
    additionalValuesFiles:
      - values.yaml
