# Argo Rollouts blue-green for openpanel-api.
# Image is rewritten by .github/workflows/cd-update-tags.yml on every push.
#
# How it works:
#   - openpanel-api          (active Service)  always serves the "blue" stack
#   - openpanel-api-preview  (preview Service) serves the new "green" stack
#                            during a release, for smoke testing in isolation
#   - autoPromotionEnabled: false → the green stack is brought up but the
#     active Service does NOT cut over until a human runs `promote`. This
#     matches the explicit-cutover semantics blue-green is known for.
#   - scaleDownDelaySeconds: 600 → the previous "blue" ReplicaSet stays
#     warm for 10 minutes after promotion so `undo` is instant if a
#     regression slips past the preview check.
#
# Promote (cut over from blue to green):
#   kubectl argo rollouts promote openpanel-api -n openpanel
#
# Roll back (instant — old ReplicaSet is still warm):
#   kubectl argo rollouts undo    openpanel-api -n openpanel
#
# Abort an in-flight release before promotion:
#   kubectl argo rollouts abort   openpanel-api -n openpanel
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: openpanel-api
  namespace: openpanel
  labels:
    app: openpanel-api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: openpanel-api
  strategy:
    blueGreen:
      activeService: openpanel-api
      previewService: openpanel-api-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 600
  template:
    metadata:
      labels:
        # No version label here. The Rollout controller adds
        # rollouts-pod-template-hash and the Services pick it up.
        app: openpanel-api
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      nodeSelector:
        workload: app
      containers:
        - name: api
          image: ghcr.io/rubenlopsol/openpanel-api:main-5faadfb
          command: ["node", "dist/index.js"]
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: openpanel-config
          env:
            - name: HOME
              value: /tmp
            - name: COREPACK_HOME
              value: /tmp/corepack
            - name: XDG_CACHE_HOME
              value: /tmp/.cache
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: openpanel-secrets
                  key: DATABASE_URL
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: openpanel-secrets
                  key: CLICKHOUSE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: openpanel-secrets
                  key: REDIS_URL
            - name: API_SECRET
              valueFrom:
                secretKeyRef:
                  name: openpanel-secrets
                  key: API_SECRET
            - name: DATABASE_URL_DIRECT
              valueFrom:
                secretKeyRef:
                  name: openpanel-secrets
                  key: DATABASE_URL_DIRECT
            - name: NODE_OPTIONS
              value: "--require @opentelemetry/auto-instrumentations-node/register"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.observability.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_SERVICE_NAME
              value: "openpanel-api"
            # OTEL_RESOURCE_ATTRIBUTES (deployment.environment=...) is added by
            # each overlay so the env tag is always correct per cluster.
            - name: OTEL_TRACES_SAMPLER
              value: "always_on"
            - name: OTEL_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz/live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
