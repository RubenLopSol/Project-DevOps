# ----------------------------------------------------------------------------
# Prometheus
# ----------------------------------------------------------------------------
prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - prometheus.local
  prometheusSpec:
    retention: 15d
    nodeSelector:
      workload: observability
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
## AlertManager
    alertingEndpoints:
      - namespace: observability
        name: alertmanager
        port: http
        pathPrefix: /
        apiVersion: v2

    additionalScrapeConfigs:
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod


additionalPrometheusRulesMap:
  openpanel-alerts:
    groups:
      - name: openpanel-alerts
        rules:
          - alert: APIDown
            expr: up{job="openpanel-api",namespace="openpanel"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "OpenPanel API is down"
              description: "OpenPanel API has been unreachable for more than 2 minutes."

          - alert: HighErrorRate
            expr: >
              sum(rate(http_request_duration_seconds_count{status_code=~"5..",namespace="openpanel"}[5m])) by (job)
              /
              sum(rate(http_request_duration_seconds_count{namespace="openpanel"}[5m])) by (job)
              > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.job }}"
              description: "HTTP 5xx error rate above 5% for more than 5 minutes."

          - alert: APIHighLatency
            expr: >
              histogram_quantile(0.99,
                sum(rate(http_request_duration_seconds_bucket{namespace="openpanel"}[5m])) by (job, le)
              ) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High P99 latency on {{ $labels.job }}"
              description: "P99 request latency is above 2s for more than 5 minutes."

          - alert: NodeJSEventLoopLag
            expr: nodejs_eventloop_lag_p99_seconds{namespace="openpanel"} > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node.js event loop lag on {{ $labels.pod }}"
              description: "P99 event loop lag exceeds 500ms — API may be CPU-starved."

          - alert: HighMemoryUsage
            expr: >
              container_memory_usage_bytes{namespace="openpanel"}
              /
              container_spec_memory_limit_bytes{namespace="openpanel"}
              > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.pod }}"
              description: "Memory usage above 90% of the configured limit."

          - alert: PostgresDown
            expr: up{job="postgres",namespace="openpanel"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Postgres is unreachable"
              description: "Postgres has been unreachable for more than 2 minutes. Login, user data, and dashboard reads are failing."

          - alert: RedisDown
            expr: up{job="redis",namespace="openpanel"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Redis is unreachable"
              description: "Redis has been unreachable for more than 2 minutes. Tracking events cannot be queued and the worker has nothing to process."


  alertmanager-self:
    groups:
      - name: alertmanager-self
        rules:
          - alert: AlertmanagerDown
            expr: absent(up{job="alertmanager",namespace="observability"} == 1)
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Alertmanager is down"
              description: "No `alertmanager` target in observability has been up for more than 5 minutes — alerts are being silently dropped."
          - alert: AlertmanagerFailedReload
            expr: max_over_time(alertmanager_config_last_reload_successful{job="alertmanager"}[5m]) == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Alertmanager config reload failed"
              description: "Reloading the Alertmanager configuration has failed for {{ $labels.namespace }}/{{ $labels.pod }}."
          - alert: AlertmanagerNotificationFailures
            expr: rate(alertmanager_notifications_failed_total{job="alertmanager"}[5m]) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Alertmanager is failing to send notifications"
              description: "Integration {{ $labels.integration }} is failing for {{ $labels.namespace }}/{{ $labels.pod }}."


grafana:
  enabled: false
  forceDeployDashboards: false

# ----------------------------------------------------------------------------
alertmanager:
  enabled: false

# ----------------------------------------------------------------------------
defaultRules:
  rules:
    alertmanager: false

# ----------------------------------------------------------------------------
# prometheus-operator
# ----------------------------------------------------------------------------
prometheusOperator:
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false
  tls:
    enabled: false

# ----------------------------------------------------------------------------
# Node Exporter (métricas del nodo)
# ----------------------------------------------------------------------------
nodeExporter:
  enabled: true

# ----------------------------------------------------------------------------
# kube-state-metrics (métricas de objetos Kubernetes)
# ----------------------------------------------------------------------------
kubeStateMetrics:
  enabled: true
