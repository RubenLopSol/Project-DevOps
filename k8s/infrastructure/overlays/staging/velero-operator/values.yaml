# =============================================================================
# Velero — staging overrides
# Backend: in-cluster MinIO in the `backup` namespace, port 9000.
#
# MinIO is deployed by ArgoCD and gives us an S3-compatible bucket on a
# 5Gi PVC. Nothing on the host needs to be running for this to work.
# Credentials line up with the minio-credentials SealedSecret.
# =============================================================================

# These have to match the minio-credentials SealedSecret in the backup
# namespace — that's what MinIO reads on first boot to set its root user.
# Defaults from scripts/reseal-secrets.sh are minioadmin/minioadmin. If you
# override them via MINIO_ROOT_USER / MINIO_ROOT_PASSWORD when resealing,
# update them here in the same PR or the BSL throws "InvalidAccessKeyId".
# Background in project-step-by-step.md §12.
credentials:
  secretContents:
    cloud: |
      [default]
      aws_access_key_id=minioadmin
      aws_secret_access_key=minioadmin

# Don't configure the BackupStorageLocation here — the `velero` ArgoCD app
# (k8s/infrastructure/overlays/staging/velero) owns it. Two apps claiming
# the same resource just gives you a SharedResourceWarning.

# Smaller resources for Minikube
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

nodeAgent:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
