# Staging trim for Postgres.
# The local DB has barely any rows in it — postgres sits at ~30 MiB idle.
# Prod values (250m/512Mi req) are huge by comparison, so we drop them and
# still keep ~4× headroom over observed usage.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: openpanel
spec:
  template:
    spec:
      containers:
        - name: postgres
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
