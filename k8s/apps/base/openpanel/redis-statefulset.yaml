apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: openpanel
  labels:
    app: redis
spec:
  # serviceName has to point at a Service with the same selector. Kept as
  # ClusterIP (not headless) to match postgres / clickhouse — with replicas=1
  # consumers just hit `redis:6379`.
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      nodeSelector:
        workload: app
      initContainers:
        # Minikube's hostpath provisioner (and local-path on some nodes)
        # creates the PV directory as root:root and ignores fsGroup. Redis
        # runs as UID 999 with a read-only root filesystem, so it can't
        # chown /data itself 
        - name: fix-permissions
          image: busybox:1.36.1
          command: ['sh', '-c', 'chown -R 999:999 /data && chmod 0700 /data']
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.55.0-alpine
          ports:
            - containerPort: 9121
              name: metrics
              protocol: TCP
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--save", "60", "1", "--requirepass", "$(REDIS_PASSWORD)"]
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            # RDB dumps and AOF land on the PVC at /data. Redis also
            # writes a tempfile during dump rotation (also under /data,
            # not /tmp). 
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  # One PVC per ordinal — StatefulSet creates `redis-data-redis-0` on the
  # first sync. 
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 2Gi
