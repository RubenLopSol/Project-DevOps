# =============================================================================
# Argo Rollouts — PROD overlay
#
# Renders the chart with base values plus the prod override (ingress for
# rollouts.openpanel.example.com). Mirrors the staging overlay structure.
#
# Standalone build:
#   kustomize build --enable-helm k8s/infrastructure/overlays/prod/argo-rollouts
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: argo-rollouts
    repo: https://argoproj.github.io/argo-helm
    version: "2.39.5"
    releaseName: argo-rollouts
    namespace: argo-rollouts
    valuesFile: ../../../base/argo-rollouts/values.yaml
    additionalValuesFiles:
      - values.yaml
