# =============================================================================
# Alertmanager — PROD overlay
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Standalone ServiceMonitor — chart 1.13.0 has no template for it.
resources:
  - ../../../../base/observability/alertmanager/servicemonitor.yaml

helmCharts:
  - name: alertmanager
    repo: https://prometheus-community.github.io/helm-charts
    version: "1.13.0"
    releaseName: alertmanager
    namespace: observability
    includeCRDs: false
    valuesFile: ../../../../base/observability/alertmanager/values.yaml
    additionalValuesFiles:
      - values.yaml
