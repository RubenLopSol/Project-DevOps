# =============================================================================
# Grafana — Helm values (standalone, decoupled from kube-prometheus-stack)
# Chart: grafana/grafana
# =============================================================================

# ----------------------------------------------------------------------------
# Admin credentials — pulled from the SealedSecret reconciled in the
# observability namespace (see overlays/*/sealed-secrets/secrets.yaml).
# ----------------------------------------------------------------------------
admin:
  existingSecret: grafana-admin-credentials
  userKey: admin-user
  passwordKey: admin-password

nodeSelector:
  workload: observability

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# ----------------------------------------------------------------------------
# Ingress
# ----------------------------------------------------------------------------
ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - grafana.local

# ----------------------------------------------------------------------------
# Datasources — Prometheus is the default, Loki and Tempo are added so logs
# and traces are queryable side-by-side. Service names assume the standard
# kube-prometheus-stack release name and the loki/tempo charts already in
# this repo.
# ----------------------------------------------------------------------------
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
        isDefault: true
        editable: false

      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki-gateway.observability.svc.cluster.local
        editable: false
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: "traceID=(\\w+)"
              name: TraceID
              url: "$${__value.raw}"

      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.observability.svc.cluster.local:3100
        editable: false
        jsonData:
          tracesToLogs:
            datasourceUid: loki
            tags: ["job", "namespace", "pod"]
          serviceMap:
            datasourceUid: prometheus

# ----------------------------------------------------------------------------
# Sidecar — auto-discover dashboard ConfigMaps across all namespaces.
# Any ConfigMap labelled `grafana_dashboard: "1"` is loaded without restart.
# ----------------------------------------------------------------------------
sidecar:
  dashboards:
    enabled: true
    searchNamespace: ALL
    label: grafana_dashboard
    labelValue: "1"
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true
  datasources:
    enabled: false

# ----------------------------------------------------------------------------
# Dashboards — only three, all maintained as JSON in `grafana-dashboards/`
# at the repo root. The sidecar discovers the matching ConfigMaps by the
# `grafana_dashboard: "1"` label, so no in-chart dashboards are needed here.
#   - cluster.json       (folder: Cluster)
#   - openpanel.json     (folder: OpenPanel)
#   - logs-traces.json   (folder: Observability)
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# ServiceMonitor — let Prometheus scrape Grafana's own /metrics.
# kube-prometheus-stack installs the CRD; Loki/Tempo/Promtail rely on it too.
# ----------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  labels: {}
  interval: 30s
