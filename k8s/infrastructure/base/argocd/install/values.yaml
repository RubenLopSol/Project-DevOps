# =============================================================================
# ArgoCD — common Helm values (shared across all environments)
#
# Environment-specific overrides live in:
#   overlays/staging/values.yaml  ← argocd.local, reduced resources
#   overlays/prod/values.yaml     ← real hostname, TLS, larger resources
# =============================================================================

configs:
  params:
    # Disable TLS between ArgoCD components — TLS is terminated at the Ingress.
    server.insecure: "true"
    # Cap concurrent manifest generations. Default "0" = unlimited, which lets
    # every Application refresh in parallel and OOMs the repo-server when the
    # observability stack (kube-prometheus-stack, loki, tempo, promtail) all
    # render at once. 4 keeps memory growth bounded.
    reposerver.parallelism.limit: "4"
    # Enable server-side diffing for the application-controller. Required for
    # per-Application `ServerSideDiff=true` syncOption to take effect (it's a
    # feature gate, not an opt-in). Without this, Helm-rendered StatefulSets
    # show permanent OutOfSync drift from API-server default-value injection
    # (e.g. minReadySeconds: 0 dropped on store), causing tight self-heal loops.
    controller.diff.server.side: "true"
  cm:
    # Pass --enable-helm to every kustomize build ArgoCD runs.
    # Required for helmChartInflationGenerator used in observability,
    # sealed-secrets, and other overlays.
    kustomize.buildOptions: "--enable-helm --load-restrictor LoadRestrictionsNone"

controller:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # Reconcile interval — how often the controller re-lists all watched
  # resources to compensate for missed watch events. Default is 180s; we
  # lower it to 60s so a missed hook-completion event self-heals within a
  # minute instead of three. Trade-off is more API server load, which is
  # negligible at this scale.
  env:
    - name: ARGOCD_RECONCILIATION_TIMEOUT
      value: "60s"
  # Expose Prometheus metrics on :8082/metrics and create a ServiceMonitor
  # so kube-prometheus-stack scrapes argocd_app_info, argocd_app_sync_total, etc.
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack

server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack

repoServer:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      # Helm rendering of kube-prometheus-stack + loki + tempo + promtail in
      # parallel pushes the repo-server well past the chart default 512Mi.
      # 1Gi gives ~2x headroom over observed peak (~500Mi). 1 CPU prevents
      # throttling during parallel `helm template` calls.
      cpu: "1"
      memory: 1Gi
  # Default probes use timeoutSeconds: 1, which the kubelet trips while the
  # Go process is busy rendering manifests, causing spurious restarts on top
  # of any actual OOMKill. Loosen the timeout and lower probe frequency.
  livenessProbe:
    timeoutSeconds: 5
    periodSeconds: 30
    failureThreshold: 6
  readinessProbe:
    timeoutSeconds: 5
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack

applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
