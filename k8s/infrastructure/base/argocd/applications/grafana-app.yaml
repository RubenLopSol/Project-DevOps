# Wave 3 — Grafana.
# Deploys after kube-prometheus-stack/loki/tempo so its datasource probes
# resolve to existing Services. Datasources themselves are evaluated lazily
# at query time, so the dependency is soft — wave 3 just keeps the UI tidy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openpanel
  source:
    repoURL: https://github.com/RubenLopSol/Project-DevOps.git
    targetRevision: main
    # Set by overlays/*/argocd/patches/app-env.yaml 
    path: PLACEHOLDER
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
