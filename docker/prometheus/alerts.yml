# Same alert rules as K8s (k8s/infrastructure/base/observability/kube-prometheus-stack/values.yaml)
# Adapted for Docker Compose — no namespace labels needed.

groups:
  - name: openpanel-alerts
    rules:

      - alert: ServiceDown
        expr: up{job="openpanel-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "OpenPanel API is down"
          description: "OpenPanel API has been unreachable for more than 2 minutes."

      - alert: HighErrorRate
        expr: >
          sum(rate(http_request_duration_seconds_count{status_code=~"5.."}[5m])) by (job)
          /
          sum(rate(http_request_duration_seconds_count[5m])) by (job)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "More than 5% of requests are returning 5xx errors."

      - alert: APIHighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="openpanel-api"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OpenPanel API P99 latency above 2s"
          description: "99th percentile latency has exceeded 2 seconds for 5 minutes."

      - alert: NodeJSEventLoopLag
        expr: nodejs_eventloop_lag_p99_seconds{job="openpanel-api"} > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node.js event loop lag above 500ms"
          description: "The API event loop is lagging, indicating CPU pressure."

      - alert: WorkerDown
        expr: up{job="openpanel-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "OpenPanel Worker is down"
          description: "OpenPanel Worker has been unreachable for more than 2 minutes."
