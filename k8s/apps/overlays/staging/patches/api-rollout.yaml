# Staging tweaks for the openpanel-api Rollout: 1 replica, smaller resource
# requests so the full stack fits on a Minikube app node, plus the OTEL
# deployment.environment=staging tag for traces.
#
# JSON 6902 patch (not strategic merge) because kustomize has no schema
# for argoproj.io/Rollout — strategic merge would replace the containers
# list instead of merging by name and wipe out the base container fields.
- op: replace
  path: /spec/replicas
  value: 1
- op: replace
  path: /spec/template/spec/containers/0/resources
  value:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: OTEL_RESOURCE_ATTRIBUTES
    value: deployment.environment=staging,service.namespace=openpanel
