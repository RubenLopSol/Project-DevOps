# App-of-Apps: every ArgoCD Application managed by this repo.
# Source paths default to staging overlays; the prod overlay rewrites them
# via overlays/prod/argocd/patches/app-env.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespaces-app.yaml
  - local-path-provisioner-app.yaml
  - sealed-secrets-app.yaml
  - cert-manager-app.yaml
  - argo-rollouts-app.yaml
  - prometheus-app.yaml
  - loki-app.yaml
  - promtail-app.yaml
  - tempo-app.yaml
  - minio-app.yaml
  - velero-operator-app.yaml
  - velero-app.yaml
  - openpanel-app.yaml
