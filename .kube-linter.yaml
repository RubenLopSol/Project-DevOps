checks:
  addAllBuiltIn: false
  include:
    - "latest-tag"
    - "unset-cpu-requirements"
    - "unset-memory-requirements"
    - "privilege-escalation-container"
    - "writable-host-mount"
    - "non-isolated-pod"
  # Excludes (why each one is off):
  # - no-anti-affinity: single-replica StatefulSets, all pinned to workload=app. Nothing to spread.
  # - no-read-only-root-fs: postgres needs a writable data dir; migrate-job writes the Prisma client.
  # - run-as-non-root: postgres + redis fix-permissions init containers chown the PVC as root.
  # - dangling-service: kube-prometheus-stack ships Services targeting kubeadm-owned pods
  #   (CoreDNS, etcd, kube-proxy) that aren't in the rendered YAML.
  exclude:
    - "no-anti-affinity"
    - "no-read-only-root-fs"
    - "run-as-non-root"
    - "dangling-service"
