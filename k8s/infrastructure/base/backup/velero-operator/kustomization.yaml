# =============================================================================
# BASE — Velero Operator
#
# Renders the vmware-tanzu/velero Helm chart via kustomize's
# helmChartInflationGenerator. This installs the Velero controller, node-agent
# DaemonSet, and all CRDs (BackupStorageLocation, Schedule, Backup, Restore…).
#
# The environment-specific backend configuration (S3 endpoint, bucket, credentials)
# is provided by the staging/prod overlay additionalValuesFiles.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: velero
    repo: https://vmware-tanzu.github.io/helm-charts
    version: "8.0.0"
    releaseName: velero
    namespace: velero
    includeCRDs: true
    valuesFile: values.yaml
