# Creates the velero-backups bucket in MinIO on first install.
#
# Without this, MinIO comes up empty and Velero's BackupStorageLocation
# stays `Unavailable` ("NoSuchBucket"), the daily-full-backup schedule
# silently fails, and `velero backup get` returns nothing forever.
#
# Runs as a PostSync hook so it fires AFTER the MinIO Deployment is healthy.
# HookDeletePolicy=BeforeHookCreation lets it re-run cleanly on every sync;
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: backup
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    ignore-check.kube-linter.io/non-isolated-pod: "staging-only PostSync hook; not deployed to prod"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: minio-bucket-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-11-21T17-21-54Z
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              # MinIO Service should be up by PostSync, but the Deployment
              # may have just become Ready — wait briefly for it to accept
              # connections before issuing mc commands.
              for i in $(seq 1 30); do
                if mc alias set minio http://minio.backup.svc.cluster.local:9000 \
                     "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; then
                  break
                fi
                echo "MinIO not reachable yet (attempt $i/30) — retrying in 2s"
                sleep 2
              done

              # Idempotent — succeeds whether the bucket exists or not.
              mc mb --ignore-existing minio/velero-backups
              echo "Bucket setup complete:"
              mc ls minio/
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            # runAsUser 1000 has no home dir in the mc image, so HOME falls back
            # to "/" and mc tries to create /.mc — which readOnlyRootFilesystem
            # blocks. Point mc at a writable emptyDir instead.
            - name: MC_CONFIG_DIR
              value: /tmp/.mc
          volumeMounts:
            - name: mc-config
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      volumes:
        - name: mc-config
          emptyDir: {}
