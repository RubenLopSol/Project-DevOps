# =============================================================================
# kube-prometheus-stack — Helm values
#
# This release now ships ONLY: prometheus-operator + CRDs + Prometheus +
# node-exporter + kube-state-metrics. Grafana and Alertmanager are deployed
# as their own ArgoCD Applications from sibling charts:
#   k8s/infrastructure/base/observability/grafana
#   k8s/infrastructure/base/observability/alertmanager
#
# Chart: prometheus-community/kube-prometheus-stack
# =============================================================================

# ----------------------------------------------------------------------------
# Prometheus
# ----------------------------------------------------------------------------
prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - prometheus.local
  prometheusSpec:
    retention: 15d
    nodeSelector:
      workload: observability
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

    # Route alerts to the standalone alertmanager Application (sibling chart).
    # The prometheus-community/alertmanager chart creates a Service named
    # `alertmanager` on port `http` (9093) in the observability namespace.
    alerting:
      alertmanagers:
        - namespace: observability
          name: alertmanager
          port: http
          pathPrefix: /

    additionalScrapeConfigs:
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

# Reglas de alerta personalizadas
additionalPrometheusRulesMap:
  openpanel-alerts:
    groups:
      - name: openpanel-alerts
        rules:
          - alert: APIDown
            # Matches the ServiceMonitor job name: openpanel/openpanel-api
            expr: up{job="openpanel-api",namespace="openpanel"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "OpenPanel API is down"
              description: "OpenPanel API has been unreachable for more than 2 minutes."

          - alert: HighErrorRate
            # http_request_duration_seconds is the metric from prom-client with labels
            # method, route, status_code. Count 5xx rate vs total.
            expr: >
              sum(rate(http_request_duration_seconds_count{status_code=~"5..",namespace="openpanel"}[5m])) by (job)
              /
              sum(rate(http_request_duration_seconds_count{namespace="openpanel"}[5m])) by (job)
              > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.job }}"
              description: "HTTP 5xx error rate above 5% for more than 5 minutes."

          - alert: APIHighLatency
            # P99 latency above 2 seconds for 5 minutes
            expr: >
              histogram_quantile(0.99,
                sum(rate(http_request_duration_seconds_bucket{namespace="openpanel"}[5m])) by (job, le)
              ) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High P99 latency on {{ $labels.job }}"
              description: "P99 request latency is above 2s for more than 5 minutes."

          - alert: NodeJSEventLoopLag
            # Event loop lag above 500ms means the JS thread is saturated
            expr: nodejs_eventloop_lag_p99_seconds{namespace="openpanel"} > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node.js event loop lag on {{ $labels.pod }}"
              description: "P99 event loop lag exceeds 500ms — API may be CPU-starved."

          - alert: HighMemoryUsage
            expr: >
              container_memory_usage_bytes{namespace="openpanel"}
              /
              container_spec_memory_limit_bytes{namespace="openpanel"}
              > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.pod }}"
              description: "Memory usage above 90% of the configured limit."

          - alert: PostgresDown
            expr: up{job="postgres-exporter",namespace="openpanel"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Postgres is unreachable"
              description: "Postgres has been unreachable for more than 2 minutes. Login, user data, and dashboard reads are failing."

          - alert: RedisDown
            expr: up{job="redis-exporter",namespace="openpanel"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Redis is unreachable"
              description: "Redis has been unreachable for more than 2 minutes. Tracking events cannot be queued and the worker has nothing to process."

# ----------------------------------------------------------------------------
# Grafana — disabled here, deployed as its own ArgoCD Application from
# k8s/infrastructure/base/observability/grafana (grafana/grafana chart).
#
# forceDeployDashboards/Datasources keep KPS's bundled dashboard ConfigMaps
# (kubernetes-cluster, etcd, etc.) deploying so the standalone Grafana
# sidecar can still discover them by label.
# ----------------------------------------------------------------------------
grafana:
  enabled: false
  forceDeployDashboards: true

# ----------------------------------------------------------------------------
# AlertManager — disabled here, deployed as its own ArgoCD Application from
# k8s/infrastructure/base/observability/alertmanager (prometheus-community
# /alertmanager chart). Prometheus is wired to it via prometheus.alerting
# above.
# ----------------------------------------------------------------------------
alertmanager:
  enabled: false

# ----------------------------------------------------------------------------
# prometheus-operator
# ----------------------------------------------------------------------------
# Admission webhooks are disabled because the cert-generation Job they need
# (kube-prometheus-stack-admission-create) is run as an ArgoCD Sync hook,
# and ArgoCD's application-controller has a known watch-event race that can
# leave it sitting on `hookPhase: Running` for several minutes after the Job
# actually completed — blocking every downstream Application that needs the
# ServiceMonitor / PrometheusRule CRDs.
#
# What we lose: server-side validation of malformed Prometheus / AlertManager
# / ServiceMonitor CRs at creation time. We don't need it: every CR in this
# repo is rendered + validated by ci-validate.yml (kubeconform) before it
# ever reaches the cluster, so the webhook would only catch ad-hoc kubectl
# applies, which we don't do here.
prometheusOperator:
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false
  # Without webhooks the operator no longer needs TLS — drop the whole TLS
  # block so the operator starts cleanly.
  tls:
    enabled: false

# ----------------------------------------------------------------------------
# Node Exporter (métricas del nodo)
# ----------------------------------------------------------------------------
nodeExporter:
  enabled: true

# ----------------------------------------------------------------------------
# kube-state-metrics (métricas de objetos Kubernetes)
# ----------------------------------------------------------------------------
kubeStateMetrics:
  enabled: true
