apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: openpanel
  labels:
    app: redis
spec:
  # serviceName must match a Service with the same selector. Kept ClusterIP
  # (not headless) to match the postgres/clickhouse pattern — at replicas=1
  # consumers reach redis via `redis:6379` and per-pod DNS is unnecessary.
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
      annotations:
        # Scraping is handled by the redis-exporter ServiceMonitor; annotation disabled to avoid duplicates.
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      nodeSelector:
        workload: app
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.55.0-alpine
          ports:
            - containerPort: 9121
              name: metrics
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--save", "60", "1", "--requirepass", "$(REDIS_PASSWORD)"]
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            # RDB dumps + AOF land on the PVC at /data. Redis also writes a
            # tempfile during dump rotation (under /data too, not /tmp). /tmp
            # is backed by emptyDir in case of Lua script caching or maint
            # commands that touch it.
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  # One PVC per ordinal. StatefulSet creates `redis-data-redis-0` on first sync.
  # NOTE: converting from the prior Deployment + standalone PVC does NOT migrate
  # data — the old `redis-data` PVC is orphaned. Fresh clusters are unaffected.
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 2Gi
