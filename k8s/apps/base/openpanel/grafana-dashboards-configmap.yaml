# =============================================================================
# Grafana Dashboard ConfigMaps — OpenPanel namespace
#
# The kube-prometheus-stack Grafana sidecar watches ALL namespaces for
# ConfigMaps labelled `grafana_dashboard: "1"`. Any such ConfigMap is
# auto-loaded into Grafana without a restart.
#
# The annotation `grafana_folder` sets the Grafana folder name so dashboards
# are organised (Cluster / OpenPanel / CI-CD).
#
# Adding a new dashboard:
#   1. Add a key under data: (filename must end in .json)
#   2. Paste the Grafana JSON export as the value
#   3. Apply — the sidecar picks it up within ~30 seconds
# =============================================================================

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cicd
  namespace: openpanel
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "CI-CD"
data:
  cicd-overview.json: |
    {
      "__inputs": [],
      "annotations": { "list": [] },
      "description": "CI/CD pipeline visibility: GitHub Actions → GHCR → ArgoCD → K8s. Shows ArgoCD app sync/health status, sync history, and currently running image versions.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "CI/CD Pipeline",
          "type": "row"
        },
        {
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 1 },
          "id": 2,
          "options": {
            "content": "## CI/CD Pipeline Chain\n\n| | Stage | Tools / Actions | Output |\n|---|---|---|---|\n| **①** | **git push → master** | Developer pushes code to master | Triggers CI-Lint-Test-Validate |\n| **②** | **CI · Lint / Test / Validate** | gitleaks · ESLint · tsc · Trivy (IaC) · kustomize build | ✅ All checks pass |\n| **③** | **CI · Build / Publish** | docker build api / worker / start → push `ghcr.io:main-SHA` · Trivy CVE scan · SBOM | Images in GHCR |\n| **④** | **CD · Update GitOps** | sed image tags in `k8s/apps/base/` · git commit `[skip ci]` · git tag `release/main-SHA` | Manifests updated |\n| **⑤** | **ArgoCD Auto-Sync** | PreSync: migrate Job (Prisma) · Sync: api-BLUE · worker · start · Blue-Green switch | Live deployment |\n\n---\n\n> 🔵 **ArgoCD panels below** show live data in K8s staging/prod &nbsp;·&nbsp; _No data_ expected in local Docker Compose (ArgoCD not running locally)",
            "mode": "markdown"
          },
          "title": "Pipeline Architecture",
          "type": "text"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 8 },
          "id": 3,
          "title": "ArgoCD — Application Status",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 9 },
          "id": 4,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "count(argocd_app_info{health_status=\"Healthy\"})", "legendFormat": "Healthy", "refId": "A" } ],
          "title": "Apps Healthy",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 9 },
          "id": 5,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "count(argocd_app_info{sync_status=\"Synced\"})", "legendFormat": "Synced", "refId": "A" } ],
          "title": "Apps Synced",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "orange", "value": null }, { "color": "red", "value": 1 } ] },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 9 },
          "id": 6,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "count(argocd_app_info{health_status!=\"Healthy\"})", "legendFormat": "Degraded", "refId": "A" } ],
          "title": "Apps Degraded",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 9 },
          "id": 7,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "center", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "count(argocd_app_info)", "legendFormat": "Total", "refId": "A" } ],
          "title": "Total Apps Managed",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "custom": { "align": "left", "filterable": true }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "health_status" }, "properties": [ { "id": "custom.cellOptions", "value": { "type": "color-background" } }, { "id": "mappings", "value": [ { "type": "value", "options": { "Healthy":    { "color": "green",  "index": 0 } } }, { "type": "value", "options": { "Degraded":   { "color": "red",    "index": 1 } } }, { "type": "value", "options": { "Progressing":{ "color": "blue",  "index": 2 } } }, { "type": "value", "options": { "Unknown":    { "color": "gray",   "index": 3 } } } ] } ] },
              { "matcher": { "id": "byName", "options": "sync_status" },   "properties": [ { "id": "custom.cellOptions", "value": { "type": "color-background" } }, { "id": "mappings", "value": [ { "type": "value", "options": { "Synced":    { "color": "green",  "index": 0 } } }, { "type": "value", "options": { "OutOfSync": { "color": "orange", "index": 1 } } }, { "type": "value", "options": { "Unknown":   { "color": "gray",   "index": 2 } } } ] } ] }
            ]
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 13 },
          "id": 8,
          "options": { "footer": { "show": false }, "showHeader": true },
          "targets": [ { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "argocd_app_info", "format": "table", "instant": true, "legendFormat": "", "refId": "A" } ],
          "title": "ArgoCD Applications",
          "transformations": [
            { "id": "filterFieldsByName", "options": { "include": { "names": ["name", "project", "dest_namespace", "sync_status", "health_status", "repo"] } } },
            { "id": "organize", "options": { "renameByName": { "name": "App", "project": "Project", "dest_namespace": "Namespace", "sync_status": "Sync", "health_status": "Health", "repo": "Repository" } } }
          ],
          "type": "table"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 21 },
          "id": 9,
          "title": "ArgoCD — Sync History",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "bars", "fillOpacity": 80, "lineWidth": 1, "stacking": { "group": "A", "mode": "normal" }, "showPoints": "never" }, "unit": "short" },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Succeeded" }, "properties": [ { "id": "color", "value": { "fixedColor": "green",  "mode": "fixed" } } ] },
              { "matcher": { "id": "byName", "options": "Failed" },    "properties": [ { "id": "color", "value": { "fixedColor": "red",    "mode": "fixed" } } ] },
              { "matcher": { "id": "byName", "options": "Error" },     "properties": [ { "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } } ] }
            ]
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 22 },
          "id": 10,
          "options": { "legend": { "calcs": ["sum"], "displayMode": "table", "placement": "right", "showLegend": true }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "increase(argocd_app_sync_total{phase=\"Succeeded\"}[$__rate_interval])", "legendFormat": "Succeeded — {{name}}", "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "increase(argocd_app_sync_total{phase=\"Failed\"}[$__rate_interval])",    "legendFormat": "Failed — {{name}}",    "refId": "B" },
            { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "increase(argocd_app_sync_total{phase=\"Error\"}[$__rate_interval])",     "legendFormat": "Error — {{name}}",     "refId": "C" }
          ],
          "title": "Sync Operations (by phase)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 30 },
          "id": 11,
          "title": "Deployed Versions (kube-state-metrics)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "custom": { "align": "left", "filterable": true } }, "overrides": [] },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 31 },
          "id": 12,
          "options": { "footer": { "show": false }, "showHeader": true },
          "targets": [ { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "kube_pod_container_info{namespace=\"openpanel\"}", "format": "table", "instant": true, "refId": "A" } ],
          "title": "Running Container Images (namespace: openpanel)",
          "transformations": [
            { "id": "filterFieldsByName", "options": { "include": { "names": ["pod", "container", "image", "image_id"] } } },
            { "id": "organize", "options": { "renameByName": { "pod": "Pod", "container": "Container", "image": "Image", "image_id": "Digest" } } }
          ],
          "type": "table"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "max": 1, "min": 0, "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "orange", "value": 0.5 }, { "color": "green", "value": 1 } ] }, "unit": "percentunit" },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 39 },
          "id": 13,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": true }, "showThresholdMarkers": true },
          "targets": [ { "datasource": { "type": "prometheus", "uid": "${datasource}" }, "expr": "kube_deployment_status_replicas_available{namespace=\"openpanel\"} / kube_deployment_spec_replicas{namespace=\"openpanel\"}", "legendFormat": "{{deployment}}", "refId": "A" } ],
          "title": "Deployment Availability (openpanel)",
          "type": "gauge"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["cicd", "argocd", "gitops"],
      "templating": {
        "list": [
          { "current": {}, "hide": 0, "includeAll": false, "name": "datasource", "options": [], "query": "prometheus", "refresh": 1, "type": "datasource", "label": "Datasource" }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "CI/CD Pipeline Overview",
      "uid": "cicd-overview",
      "version": 1
    }
