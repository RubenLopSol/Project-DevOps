# =============================================================================
# cert-manager controller — base chart definition
#
# Chart:   jetstack/cert-manager
# Version: v1.16.2
# Repo:    https://charts.jetstack.io
#
# Base installs the controller + CRDs only. ClusterIssuers are env-specific
# (selfsigned in staging, ACME in prod) and live in the overlays.
#
# Standalone deploy (base values only):
#   kustomize build --enable-helm k8s/infrastructure/base/cert-manager | kubectl apply -f -
#
# In practice deploy via the environment overlay:
#   kustomize build --enable-helm k8s/infrastructure/overlays/staging/cert-manager | kubectl apply -f -
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: "v1.16.2"
    releaseName: cert-manager
    namespace: cert-manager
    valuesFile: values.yaml
    includeCRDs: true
