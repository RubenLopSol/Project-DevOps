# =============================================================================
# Grafana — STAGING overrides (Minikube-sized).
# Merged on top of base/observability/grafana/values.yaml.
# =============================================================================

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

persistence:
  enabled: true
  type: pvc
  size: 1Gi
  accessModes:
    - ReadWriteOnce
