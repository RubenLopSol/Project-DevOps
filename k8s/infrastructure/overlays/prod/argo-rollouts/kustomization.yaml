apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: argo-rollouts
    repo: https://argoproj.github.io/argo-helm
    version: 2.39.5
    releaseName: argo-rollouts
    namespace: argo-rollouts
    valuesFile: values.yaml
    includeCRDs: true

commonAnnotations:
  environment: prod
  managed-by: kustomize

labels:
  - pairs:
      env: prod
    includeSelectors: false
