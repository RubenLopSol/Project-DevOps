# =============================================================================
# Grafana — PROD overrides.
# =============================================================================

replicas: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 512Mi

ingress:
  hosts:
    - grafana.<DOMAIN>.com   # replace with real domain
  tls:
    - secretName: grafana-tls
      hosts:
        - grafana.<DOMAIN>.com  # replace with real domain
