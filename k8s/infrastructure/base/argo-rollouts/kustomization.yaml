# Argo Rollouts controller via upstream Helm. Pinned at 2.39.5 (last version
# known-good against k8s 1.28). includeCRDs: true bundles the Rollout /
# Analysis* / Experiment CRDs so a single sync brings everything up.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: argo-rollouts
    repo: https://argoproj.github.io/argo-helm
    version: 2.39.5
    releaseName: argo-rollouts
    namespace: argo-rollouts
    valuesFile: values.yaml
    includeCRDs: true
