loki:
  storage:
    type: s3
    bucketNames:
      chunks: openpanel-loki-logs-prod
      ruler: openpanel-loki-logs-prod
      admin: openpanel-loki-logs-prod
    s3:
      region: us-east-1
      s3ForcePathStyle: false
      insecure: false

singleBinary:
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
