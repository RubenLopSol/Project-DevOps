version: 2

# Dependabot opens a PR for each available dependency update. Review + merge.
#
# Scope (infra repo only — the app fork has its own dependabot.yml):
#   github-actions — workflows in .github/workflows/*.yml
#   terraform      — provider pins in terraform/environments/* and modules/*
#
# npm + docker are intentionally NOT configured here — the application code,
# Dockerfiles, and pnpm workspace live in the RubenLopSol/openpanel fork and
# are updated by that repo's own Dependabot config.

updates:

  # GitHub Actions — scans every "uses: action@version" in workflow files.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"

  # Terraform providers — one entry per directory that declares providers.
  # Dependabot reads versions.tf / providers.tf and proposes provider bumps.
  - package-ecosystem: "terraform"
    directory: "/terraform/environments/staging"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(tf-staging)"
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/environments/prod"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(tf-prod)"
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/modules/backup-storage"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(tf-module)"
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/modules/iam-irsa"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(tf-module)"
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "terraform"
    directory: "/terraform/modules/iam-user"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(tf-module)"
    labels:
      - "dependencies"
      - "terraform"
