# Staging trim for Postgres.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: openpanel
spec:
  template:
    spec:
      containers:
        - name: postgres
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
