# =============================================================================
# cert-manager — STAGING overlay
#
# Renders the controller Helm chart and applies the self-signed ClusterIssuer
# in one pass. Kustomize cannot merge helmCharts blocks from base, so the full
# chart spec is re-declared here pointing valuesFile at the base values.
#
# Standalone deploy:
#   kustomize build --enable-helm k8s/infrastructure/overlays/staging/cert-manager | kubectl apply -f -
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: "v1.16.2"
    releaseName: cert-manager
    namespace: cert-manager
    valuesFile: ../../../base/cert-manager/values.yaml
    includeCRDs: true

resources:
  - cluster-issuer.yaml

labels:
  - pairs:
      app.kubernetes.io/name: cert-manager
      environment: staging
    includeSelectors: false
