# Wave 1 — Sealed Secrets controller must be running before ArgoCD syncs secrets
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openpanel
  source:
    repoURL: https://github.com/RubenLopSol/Project-DevOps.git
    targetRevision: main
    # Set by overlays/*/argocd/patches/app-env.yaml — never hardcoded here
    path: PLACEHOLDER
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      # ServerSideDiff has the API server compute the diff via dry-run apply,
      # which normalizes zero-valued fields like `template.metadata.creationTimestamp: null`
      # that kubeseal emits. Without this the SealedSecret CRs flap permanently
      # OutOfSync, dragging bootstrap (app-of-apps) into a self-heal loop.
      - ServerSideApply=true
      - ServerSideDiff=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
