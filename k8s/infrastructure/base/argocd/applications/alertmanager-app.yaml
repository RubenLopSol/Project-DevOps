# Wave 2 — Alertmanager (sibling of Prometheus).
# Deployed in the same wave as kube-prometheus-stack so the Service
# `alertmanager` exists when Prometheus tries to send alerts.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alertmanager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openpanel
  source:
    repoURL: https://github.com/RubenLopSol/Project-DevOps.git
    targetRevision: main
    # Set by overlays/*/argocd/patches/app-env.yaml — never hardcoded here
    path: PLACEHOLDER
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      # Compute diffs server-side so Kubernetes default-value injection on
      # StatefulSet (podManagementPolicy, updateStrategy, probe defaults,
      # zero-valued minReadySeconds) doesn't show as permanent drift.
      - ServerSideDiff=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
