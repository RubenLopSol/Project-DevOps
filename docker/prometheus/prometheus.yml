global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OpenPanel API — exposes /metrics via fastify-metrics
  - job_name: 'openpanel-api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: '/metrics'

  # OpenPanel Worker — exposes /metrics via prom-client
  - job_name: 'openpanel-worker'
    static_configs:
      - targets: ['worker:3000']
    metrics_path: '/metrics'
