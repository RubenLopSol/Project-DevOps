# =============================================================================
# Alertmanager — Helm values (standalone, decoupled from kube-prometheus-stack)
# Chart: prometheus-community/alertmanager
# =============================================================================

replicaCount: 1

nodeSelector:
  workload: observability

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# ----------------------------------------------------------------------------
# Service — Prometheus references this by (namespace, name, port).
# Keep `port` named `http` — the Prometheus CR alerting block expects it.
# ----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 9093
  portName: http

# ----------------------------------------------------------------------------
# Persistence — small PVC for the silence/notification log.
# Local-path on Minikube; storageClass is overridden per-environment.
# ----------------------------------------------------------------------------
persistence:
  enabled: true
  size: 1Gi

# ----------------------------------------------------------------------------
# Ingress
# ----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: alertmanager.local
      paths:
        - path: /
          pathType: Prefix

# ----------------------------------------------------------------------------
# Note: prometheus-community/alertmanager chart 1.13.0 has no ServiceMonitor
# template — `serviceMonitor.enabled` is silently ignored. The ServiceMonitor
# is shipped as a standalone manifest at
#   base/observability/alertmanager/servicemonitor.yaml
# and pulled in by each overlay's kustomization. The job label it produces
# (`alertmanager`) matches the alertmanager-self PrometheusRules in the KPS
# values (additionalPrometheusRulesMap.alertmanager-self).
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# Alertmanager configuration.
#
# Slack receiver with a placeholder webhook so routing and templates show up
# in the UI for demos. Slack delivery returns 404 until a real webhook is
# wired in (Sealed Secret in prod).
#
# Production setup typically splits routes by severity: critical -> PagerDuty
# (page on-call), warning/info -> Slack (notify the team channel).
# ----------------------------------------------------------------------------
config:
  global:
    resolve_timeout: 5m
    slack_api_url: 'https://hooks.slack.com/services/DEMO/PLACEHOLDER/REPLACE_ME'
  route:
    group_by: ['alertname', 'namespace', 'severity']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 12h
    receiver: 'slack'
  inhibit_rules:
    - source_matchers:
        - severity = critical
      target_matchers:
        - severity = warning
      equal: ['alertname', 'namespace']
  receivers:
    - name: 'slack'
      slack_configs:
        - channel: '#alerts-thesis'
          send_resolved: true
          title: '{{ .Status | toUpper }} · {{ .CommonLabels.alertname }}'
          text: |-
            {{ range .Alerts -}}
            *Severity:* `{{ .Labels.severity }}`
            *Namespace:* `{{ .Labels.namespace }}`
            *Summary:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            {{ end }}
