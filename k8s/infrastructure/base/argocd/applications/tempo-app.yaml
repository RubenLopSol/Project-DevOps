# Wave 3 — Tempo (distributed tracing backend)
# Deploys after observability-prometheus (wave 2) so that ServiceMonitor CRDs are
# available. Deploys alongside loki and promtail (also wave 3).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openpanel
  source:
    repoURL: https://github.com/RubenLopSol/Project-DevOps.git
    targetRevision: main
    # Set by overlays/*/argocd/patches/app-env.yaml — never hardcoded here
    path: PLACEHOLDER
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  # The upstream tempo chart omits `protocol: TCP` on TCP container ports.
  # ServerSideApply uses (name, protocol) as the composite key, so SSA can't
  # diff them. We stick with client-side apply (no ServerSideApply syncOption)
  # and ignore the immutable volumeClaimTemplates field, which Kubernetes
  # forbids changing once the StatefulSet exists.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
