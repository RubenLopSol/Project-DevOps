# =============================================================================
# Base — OpenPanel application layer
#
# Defines all resources for the OpenPanel stack: API (Argo Rollouts canary),
# Dashboard, Worker, PostgreSQL, ClickHouse, Redis, Ingress, NetworkPolicies.
# Environment-specific tuning (replicas, resources, TLS) is applied via
# overlays/staging and overlays/prod.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openpanel

resources:
  # Config
  - configmap.yaml
  # API — Argo Rollouts canary (replaces api-deployment-blue + api-deployment-green)
  # The old blue/green Deployment files are kept on disk for reference but no
  # longer applied. Delete them after the cutover succeeds.
  - api-rollout.yaml
  - api-service.yaml
  - api-canary-service.yaml
  # Dashboard
  - start-deployment.yaml
  - start-service.yaml
  # DB migrations (runs as ArgoCD PreSync hook before every deploy)
  - migrate-job.yaml
  # Worker
  - worker-deployment.yaml
  # PostgreSQL
  - postgres-statefulset.yaml
  - postgres-service.yaml
  # ClickHouse
  - clickhouse-configmap.yaml
  - clickhouse-statefulset.yaml
  - clickhouse-service.yaml
  # Redis
  - redis-statefulset.yaml
  - redis-service.yaml
  # Networking
  - ingress.yaml
  - network-policies.yaml
  # TLS — cert-manager reconciles this Certificate into openpanel-tls Secret
  - certificate.yaml
  # Observability — ServiceMonitors picked up by Prometheus Operator
  - servicemonitors.yaml
  # Grafana dashboards — sidecar picks up ConfigMaps labelled grafana_dashboard=1
  - grafana-dashboards-configmap.yaml

labels:
  - pairs:
      project: openpanel
    includeSelectors: false
