# =============================================================================
# Argo Rollouts — STAGING overlay
#
# Renders the chart with base values plus the staging override (ingress for
# rollouts.local). Mirrors the structure of other overlays (tempo, loki, etc.).
#
# Standalone build:
#   kustomize build --enable-helm k8s/infrastructure/overlays/staging/argo-rollouts
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: argo-rollouts
    repo: https://argoproj.github.io/argo-helm
    version: "2.39.5"
    releaseName: argo-rollouts
    namespace: argo-rollouts
    valuesFile: ../../../base/argo-rollouts/values.yaml
    additionalValuesFiles:
      - values.yaml
