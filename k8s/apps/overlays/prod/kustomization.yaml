# Prod overlay. Adds a PDB and patches: API Rollout to 3 replicas, worker
# to 2, ingress to a real domain + TLS, configmap to prod URLs.
#
# Before pointing this at a real prod cluster:
#   - cert-manager ClusterIssuer 'letsencrypt-prod' must exist
#   - replace placeholder domains in patches/ingress.yaml + configmap.yaml
#   - reseal secrets against the prod keypair (staging keys won't work)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/openpanel
  - resources/pdb.yaml

commonAnnotations:
  environment: prod
  managed-by: kustomize

labels:
  - pairs:
      env: prod
    includeSelectors: false

patches:
  # JSON 6902 patch: needs an explicit target since the patch file has no
  # apiVersion/kind/name of its own.
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: openpanel-api
    path: patches/api-rollout.yaml
  - path: patches/worker.yaml
  - path: patches/configmap.yaml
  - path: patches/ingress.yaml
